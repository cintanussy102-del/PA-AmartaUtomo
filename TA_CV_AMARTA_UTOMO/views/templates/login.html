<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Pengguna - CV Amarta Utomo</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        .header-nav { width: 100%; max-width: 450px; margin-bottom: 15px; text-align: left; }
        .back-link { color: #64748b; text-decoration: none; font-size: 0.9rem; font-weight: 600; }
        .back-link:hover { color: #cc7a5c; }
        .eye-icon { position: absolute; right: 15px; top: 42px; cursor: pointer; color: #94a3b8; font-size: 1.2rem; }
    </style>
</head>
<body>

    <div class="login-card">
    <div class="back-nav">
        <a href="{{ url_for('welcome') }}">← Kembali ke Halaman Utama</a>
    </div>

    <h2>LOGIN PENGGUNA</h2>
    <form action="{{ url_for('login') }}" method="POST">
        <div class="input-row">
            <span class="icon">👤</span>
            <div class="input-field">
                <label>Username</label>
                <input type="text" name="username" placeholder="Masukan Username" required>
            </div>
        </div>
        
        <div class="input-row">
            <span class="icon">🔐</span>
            <div class="input-field">
                <label>Password</label>
                <input type="password" name="password" id="password" placeholder="Masukan Password" required>
                <button type="button" class="eye-toggle" onclick="togglePassword()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                        <circle cx="12" cy="12" r="3"></circle>
                    </svg>
                </button>
            </div>
        </div>
        
        <button type="submit" class="btn-submit">Masuk Sistem</button>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <p class="login-error">{{ message }}</p>
                {% endfor %}
            {% endif %}
        {% endwith %}

    </form>
</div>

    </div>

    <script>
    function togglePassword() {
        const passInput = document.getElementById("password");
        const button = document.querySelector(".eye-toggle");

        if (passInput.type === "password") {
            passInput.type = "text";
            button.innerHTML = `
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" 
            stroke="currentColor" stroke-width="2">
                <path d="M17.94 17.94A10.94 10.94 0 0 1 12 20
                c-7 0-11-8-11-8a21.77 21.77 0 0 1 5.06-5.94">
                </path>
                <path d="M1 1l22 22"></path>
            </svg>`;
        } else {
            passInput.type = "password";
            button.innerHTML = `
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" 
            stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z">
                </path>
                <circle cx="12" cy="12" r="3"></circle>
            </svg>`;
        }
    }
    </script>
</body>
</html>
