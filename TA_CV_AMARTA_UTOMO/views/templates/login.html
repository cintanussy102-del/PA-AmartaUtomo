<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Pengguna - CV Amarta Utomo</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        /* Tambahan style untuk ikon mata dan tombol kembali */
        .header-nav { width: 100%; max-width: 450px; margin-bottom: 15px; text-align: left; }
        .back-link { color: #64748b; text-decoration: none; font-size: 0.9rem; font-weight: 600; }
        .back-link:hover { color: #cc7a5c; }
        .eye-icon { position: absolute; right: 15px; top: 42px; cursor: pointer; color: #94a3b8; font-size: 1.2rem; }
    </style>
</head>
<body>

    <div class="login-card">
    <div class="back-nav">
        <a href="{{ url_for('welcome') }}">← Kembali ke Halaman Utama</a>
    </div>

    <h2>Login Pengguna</h2>
    <form action="{{ url_for('login') }}" method="POST">
        <div class="input-row">
            <span class="icon">👤</span>
            <div class="input-field">
                <label>Username</label>
                <input type="text" name="username" placeholder="Masukan Username" required>
            </div>
        </div>
        
        <div class="input-row">
            <span class="icon">🔒</span>
            <div class="input-field">
                <label>Password</label>
                <input type="password" name="password" id="password" placeholder="Masukan Password" required>
                <button type="button" class="eye-toggle" onclick="togglePassword()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                        <circle cx="12" cy="12" r="3"></circle>
                    </svg>
                </button>
            </div>
        </div>
        
        <button type="submit" class="btn-submit">Masuk Sistem</button>
    </form>
</div>

<script>
    function togglePassword() {
        const x = document.getElementById("password");
        if (x.type === "password") {
            x.type = "text";
        } else {
            x.type = "password";
        }
    }
</script>
    </div>

    <script>
        function togglePassword() {
            const passInput = document.getElementById("password");
            const icon = document.querySelector(".eye-icon");
            if (passInput.type === "password") {
                passInput.type = "text";
                icon.textContent = "🙈";
            } else {
                passInput.type = "password";
                icon.textContent = "👁️";
            }
        }
    </script>
</body>
</html>
